{% extends "rotations/base.html" %}

{% block title %}Вход | Риск травм АПЛ{% endblock %}

{% block content %}
<h1 class="page-title">Вход</h1>
<p class="page-desc">Войдите, чтобы добавлять игроков в базу.</p>

<div class="panel form-box">
    {% if form.errors %}
    <p style="color:#dc2626;margin-bottom:0.75rem;">Неверное имя пользователя или пароль.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <p>
            <label for="id_username">Имя пользователя</label>
            <input type="text" name="username" autofocus required id="id_username"
                   value="{{ form.username.value|default:'' }}">
        </p>
        <p>
            <label for="id_password">Пароль</label>
            <input type="password" name="password" required id="id_password">
        </p>
        <input type="hidden" name="next" value="{{ next }}">
        <button class="btn" type="submit">Войти</button>
    </form>
    <p class="auth-footer">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</div>
{% endblock %}
